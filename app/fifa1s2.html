<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASPORTS Live Player</title><meta name="monetag" content="f6122dcf0ae0344432a93322d9615e30"><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

#player-container{
position:relative;
width:100%;
height:100%;
background:#000;
}

video{
width:100%;
height:100%;
background:#000;
}

#play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
padding:15px 25px;
font-size:24px;
border:none;
border-radius:10px;
background: rgba(0, 191, 255, 0.5);
color:#fff;
cursor:pointer;
}

#unmute-btn{
position:absolute;
top:15px;
left:15px;
z-index:20;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background: rgba(0, 191, 255, 0.5);
color:#fff;
cursor:pointer;
}

#fullscreen-btn{
position:absolute;
top:15px;
right:15px;
z-index:20;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background: rgba(0, 191, 255, 0.5);
color:#fff;
cursor:pointer;
}

#spinner{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:60px;
height:60px;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
z-index:30;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}
</style></head>
<body><div id="player-container"><video
id="video"
playsinline
webkit-playsinline
preload="auto"
muted>
</video>

<button id="play-btn">▶ Play</button>
<button id="unmute-btn">🔊 Unmute</button>
<button id="fullscreen-btn">⛶</button>

<div id="spinner"></div></div><script>
let monetagLoaded=false;

function loadMonetagAds(){

if(monetagLoaded) return;

monetagLoaded=true;

(function(s){
s.dataset.zone='10131170';
s.src='https://al5sm.com/tag.min.js';
document.body.appendChild(s);
})(document.createElement('script'));

(function(s){
s.dataset.zone='10131172';
s.src='https://groleegni.net/vignette.min.js';
document.body.appendChild(s);
})(document.createElement('script'));

}
</script><script>

const streamUrl='https://gooz.freetvs.workers.dev/?url=https://pl.kamfir3.space/playlist/53550/ring3/caxi';

const video=document.getElementById('video');
const playBtn=document.getElementById('play-btn');
const unmuteBtn=document.getElementById('unmute-btn');
const fullscreenBtn=document.getElementById('fullscreen-btn');
const spinner=document.getElementById('spinner');

let hls=null;
let reloadTimer=null;

function showSpinner(show){
spinner.style.display=show?'block':'none';
}

function reloadStream(){

clearTimeout(reloadTimer);

reloadTimer=setTimeout(()=>{
initPlayer();
},3000);

}

function initPlayer(){

showSpinner(true);

if(hls){
hls.destroy();
hls=null;
}

if(Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:90,
maxBufferLength:30,
maxMaxBufferLength:60
});

hls.loadSource(streamUrl);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

showSpinner(false);

playBtn.style.display='block';

});

hls.on(Hls.Events.ERROR,(event,data)=>{

console.log('HLS ERROR',data);

if(data.fatal){

switch(data.type){

case Hls.ErrorTypes.NETWORK_ERROR:
hls.startLoad();
break;

case Hls.ErrorTypes.MEDIA_ERROR:
hls.recoverMediaError();
break;

default:
reloadStream();
break;

}

}

});

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=streamUrl;

video.addEventListener('loadedmetadata',()=>{
showSpinner(false);
playBtn.style.display='block';
});

}

}

playBtn.addEventListener('click',async()=>{

try{

await video.play();

playBtn.style.display='none';

loadMonetagAds();

}catch(e){
console.log(e);
}

});

unmuteBtn.addEventListener('click',()=>{

video.muted=false;
video.volume=1;

unmuteBtn.style.display='none';

loadMonetagAds();

});

fullscreenBtn.addEventListener('click',()=>{

if(!document.fullscreenElement){

video.requestFullscreen?.();

}else{

document.exitFullscreen?.();

}

});

video.addEventListener('waiting',()=>showSpinner(true));
video.addEventListener('playing',()=>showSpinner(false));
video.addEventListener('stalled',reloadStream);
video.addEventListener('ended',reloadStream);
video.addEventListener('error',reloadStream);

initPlayer();

</script></body>
</html>
