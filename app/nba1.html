<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HLS TV Player</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #video-container {
    position: fixed;
    inset: 0;
    background: #000;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* Overlay text at the top */
  #overlay-text {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 24px;
    font-family: Arial, sans-serif;
    background: rgba(0, 0, 0, 0.5);
    padding: 6px 12px;
    border-radius: 6px;
    pointer-events: none;
    transition: opacity 0.3s;
  }
</style>
</head>

<body>

<div id="video-container">
  <video id="player" playsinline muted></video>
  <div id="overlay-text">Click to play</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

<script>
const video = document.getElementById("player");
const overlay = document.getElementById("overlay-text");
const manifest = "https://cdn6.tgfiles.cfd/live/cdn6/chunks.m3u8";

// Unlock audio for auto-unmute
async function unlockSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = ctx.createOscillator();
  const silent = ctx.createGain();
  silent.gain.value = 0;
  oscillator.connect(silent);
  silent.connect(ctx.destination);
  oscillator.start();

  setTimeout(() => {
    oscillator.stop();
    ctx.close();
  }, 50);
}

// Initialize HLS video
async function initVideo() {
  try {
    await unlockSound();
    video.muted = false; // Auto-unmute
    video.volume = 1.0;

    if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = manifest;
      await video.play();
    } else if (Hls.isSupported()) {
      const hls = new Hls({
        maxBufferLength: 30,
        maxRetry: 1,
        retryDelay: 1000,
        fragLoadingTimeOut: 20000,
        levelLoadingTimeOut: 20000,
        autoStartLoad: true
      });

      hls.loadSource(manifest);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, async () => {
        await video.play();
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch(data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              hls.stopLoad();
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError();
              break;
            default:
              hls.destroy();
              break;
          }
        }
      });
    }

    // Hide overlay once video starts
    video.addEventListener('playing', () => {
      overlay.style.opacity = 0;
    });

  } catch (err) {
    console.warn("Auto-play blocked or error:", err);
  }
}

// Auto-play immediately
initVideo();

// TV remote & keyboard controls
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case "Enter":        // OK/Play toggle
    case " ":            // Space key
      if (video.paused) video.play();
      else video.pause();
      break;
    case "ArrowUp":      // Volume up
      video.volume = Math.min(1, video.volume + 0.1);
      break;
    case "ArrowDown":    // Volume down
      video.volume = Math.max(0, video.volume - 0.1);
      break;
    case "m":            // Mute/unmute
    case "M":
      video.muted = !video.muted;
      break;
  }
});

// Fallback for mobile if auto-play blocked
document.addEventListener("touchstart", initVideo, { once: true });
document.addEventListener("click", initVideo, { once: true });
</script>

</body>
</html>
