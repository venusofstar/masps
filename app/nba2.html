<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HLS TV Player</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#000;
overflow:hidden;
}

#video-container{
position:fixed;
inset:0;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

/* overlay text */
#overlay-text{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
color:#fff;
font-size:24px;
font-family:Arial;
background:rgba(0,0,0,.5);
padding:6px 12px;
border-radius:6px;
pointer-events:none;
transition:opacity .3s;
}

/* control buttons */
#controls{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:10;
}

.control-btn{
background:#00c853;
border:none;
color:#fff;
font-size:18px;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.5);
}

.control-btn:hover{
background:#00e676;
}

</style>
</head>

<body>

<div id="video-container">

<video id="player" playsinline muted></video>

<div id="overlay-text">Click Play</div>

<div id="controls">
<button class="control-btn" id="playBtn">▶ Play</button>
<button class="control-btn" id="unmuteBtn">🔊 Unmute</button>
<button class="control-btn" id="fsBtn">⛶ Fullscreen</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

<script>

const video=document.getElementById("player");
const overlay=document.getElementById("overlay-text");

const playBtn=document.getElementById("playBtn");
const unmuteBtn=document.getElementById("unmuteBtn");
const fsBtn=document.getElementById("fsBtn");

const manifest="https://cdn6.tgfiles.cfd/live/cdn6/chunks.m3u8";

async function unlockSound(){
const ctx=new(window.AudioContext||window.webkitAudioContext)();
const oscillator=ctx.createOscillator();
const silent=ctx.createGain();
silent.gain.value=0;
oscillator.connect(silent);
silent.connect(ctx.destination);
oscillator.start();
setTimeout(()=>{
oscillator.stop();
ctx.close();
},50);
}

async function initVideo(){

try{

await unlockSound();

if(video.canPlayType("application/vnd.apple.mpegurl")){
video.src=manifest;

}else if(Hls.isSupported()){

const hls=new Hls({
maxBufferLength:30
});

hls.loadSource(manifest);
hls.attachMedia(video);

}

}catch(e){
console.log(e);
}

}

initVideo();

/* PLAY BUTTON */
playBtn.onclick=async()=>{
video.muted=false;
video.volume=1;
await video.play();
overlay.style.opacity=0;
};

/* UNMUTE */
unmuteBtn.onclick=()=>{
video.muted=false;
video.volume=1;
};

/* FULLSCREEN */
fsBtn.onclick=()=>{
const el=document.getElementById("video-container");

if(el.requestFullscreen){
el.requestFullscreen();
}else if(el.webkitRequestFullscreen){
el.webkitRequestFullscreen();
}
};

/* keyboard remote control */
document.addEventListener("keydown",(e)=>{

switch(e.key){

case "Enter":
if(video.paused) video.play();
else video.pause();
break;

case "ArrowUp":
video.volume=Math.min(1,video.volume+0.1);
break;

case "ArrowDown":
video.volume=Math.max(0,video.volume-0.1);
break;

case "m":
video.muted=!video.muted;
break;

}

});

</script>

</body>
</html>
