
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HLS TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:black;
overflow:hidden;
}

#video-container{
position:fixed;
inset:0;
background:black;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* CENTER PLAY BUTTON */
#play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
font-size:24px;
border:none;
border-radius:10px;
background:rgba(0,200,0,.7);
color:white;
cursor:pointer;
z-index:10;
}

#play-btn:hover{
background:rgba(0,200,0,1);
}

/* UNMUTE BUTTON */
#unmute-btn{
position:absolute;
top:15px;
left:15px;
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:rgba(0,200,0,.5);
color:white;
cursor:pointer;
z-index:10;
}

/* FULLSCREEN BUTTON */
#fullscreen-btn{
position:absolute;
top:15px;
right:15px;
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:rgba(0,200,0,.5);
color:white;
cursor:pointer;
z-index:10;
}

/* BUFFER SPINNER */
#spinner{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:8px solid rgba(255,255,255,.2);
border-top:8px solid white;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
display:none;
z-index:20;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

</style>
</head>

<body>

<div id="video-container">

<video id="player" playsinline muted></video>

<button id="play-btn">▶ Play</button>
<button id="unmute-btn">🔊 Unmute</button>
<button id="fullscreen-btn">⛶</button>

<div id="spinner"></div>

</div>

<script>

const video=document.getElementById("player");
const playBtn=document.getElementById("play-btn");
const unmuteBtn=document.getElementById("unmute-btn");
const fsBtn=document.getElementById("fullscreen-btn");
const spinner=document.getElementById("spinner");

const manifest="https://cdn6.tgfiles.cfd/live/cdn6/chunks.m3u8";

let hls;

function showSpinner(show){
spinner.style.display=show?"block":"none";
}

function initPlayer(){

if(video.canPlayType("application/vnd.apple.mpegurl")){
video.src=manifest;
}else if(Hls.isSupported()){

hls=new Hls({
maxBufferLength:30,
lowLatencyMode:true
});

hls.loadSource(manifest);
hls.attachMedia(video);

}

video.addEventListener("waiting",()=>showSpinner(true));
video.addEventListener("playing",()=>showSpinner(false));

}

playBtn.onclick=()=>{
video.play();
playBtn.style.display="none";
};

unmuteBtn.onclick=()=>{
video.muted=false;
video.volume=1;
unmuteBtn.style.display="none";
};

fsBtn.onclick=()=>{
const el=document.getElementById("video-container");

if(!document.fullscreenElement){
el.requestFullscreen();
}else{
document.exitFullscreen();
}
};

/* keyboard remote */

document.addEventListener("keydown",(e)=>{

switch(e.key){

case "Enter":
if(video.paused) video.play();
else video.pause();
break;

case "ArrowUp":
video.volume=Math.min(1,video.volume+0.1);
break;

case "ArrowDown":
video.volume=Math.max(0,video.volume-0.1);
break;

case "m":
video.muted=!video.muted;
break;

}

});

initPlayer();

</script>

</body>
</html>
