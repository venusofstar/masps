<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HLS TV Player</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  overflow:hidden;
}

#video-container{
  position:fixed;
  inset:0;
  background:#000;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* overlay text */
#overlay-text{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:24px;
  font-family:Arial;
  background:rgba(0,0,0,.5);
  padding:6px 12px;
  border-radius:6px;
  pointer-events:none;
  transition:opacity .3s;
}

/* CENTER PLAY BUTTON */
#play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  padding:15px 25px;
  font-size:24px;
  border:none;
  border-radius:10px;
  background:rgba(0,200,0,.7);
  color:#fff;
  cursor:pointer;
}

/* UNMUTE BUTTON */
#unmute-btn{
  position:absolute;
  top:15px;
  left:15px;
  z-index:10;
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:rgba(0,200,0,.5);
  color:white;
  cursor:pointer;
}

/* FULLSCREEN BUTTON */
#fullscreen-btn{
  position:absolute;
  top:15px;
  right:15px;
  z-index:10;
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:rgba(0,200,0,.5);
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="video-container">

<video id="player" playsinline muted></video>

<div id="overlay-text">Click Play</div>

<button id="play-btn">▶ Play</button>
<button id="unmute-btn">🔊 Unmute</button>
<button id="fullscreen-btn">⛶</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

<script>
const video=document.getElementById("player");
const overlay=document.getElementById("overlay-text");

const playBtn=document.getElementById("play-btn");
const unmuteBtn=document.getElementById("unmute-btn");
const fsBtn=document.getElementById("fullscreen-btn");

const manifest="https://e22cd317d72ce9c3afea3614629c9397.livehwc4.com/nami.videobss.com/live/hd-en-2-3867750.m3u8?sub_m3u8=true&edge_slice=true&user_session_id=1b2322797d0d805dc7fbb644e839bbb1";

/* unlock sound */
async function unlockSound(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const oscillator=ctx.createOscillator();
  const silent=ctx.createGain();
  silent.gain.value=0;
  oscillator.connect(silent);
  silent.connect(ctx.destination);
  oscillator.start();
  setTimeout(()=>{oscillator.stop();ctx.close();},50);
}

async function initVideo(){

  await unlockSound();

  if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src=manifest;
  }
  else if(Hls.isSupported()){
    const hls=new Hls({
      maxBufferLength:30
    });

    hls.loadSource(manifest);
    hls.attachMedia(video);
  }

}

/* PLAY BUTTON */
playBtn.onclick=async()=>{
  video.muted=false;
  video.volume=1;
  await video.play();
  overlay.style.opacity=0;
  playBtn.style.display="none";
};

/* UNMUTE BUTTON */
unmuteBtn.onclick=()=>{
  video.muted=false;
  video.volume=1;
  unmuteBtn.style.display="none";
};

/* FULLSCREEN BUTTON */
fsBtn.onclick=()=>{
  const el=document.getElementById("video-container");

  if(el.requestFullscreen){
    el.requestFullscreen();
  }else if(el.webkitRequestFullscreen){
    el.webkitRequestFullscreen();
  }
};

/* TV remote controls */
document.addEventListener("keydown",(e)=>{
  switch(e.key){

    case "Enter":
    case " ":
      if(video.paused) video.play();
      else video.pause();
      break;

    case "ArrowUp":
      video.volume=Math.min(1,video.volume+0.1);
      break;

    case "ArrowDown":
      video.volume=Math.max(0,video.volume-0.1);
      break;

    case "m":
      video.muted=!video.muted;
      break;

  }
});

initVideo();
</script>

</body>
</html>
