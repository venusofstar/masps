<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Fullscreen</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #000;
}

iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;

  /* disable touch/click */
  pointer-events: none;
}
</style>
</head>

<body>

<iframe
  src="https://www.youtube.com/embed/kV9veFdbqMw?autoplay=1&mute=0&controls=0&playsinline=1&rel=0&modestbranding=1"
  allow="autoplay; fullscreen"
  allowfullscreen>
</iframe>

</body>
</html>
