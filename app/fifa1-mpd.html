<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fifa</title>

<!-- Shaka Player Library -->
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

#player-container {
    width: 100%;
    height: 100%;
    position: relative;
    background: black;
}

video {
    width: 100%;
    height: 100%;
    background: black;
}

/* UI Buttons */
#play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    padding: 15px 25px;
    font-size: 24px;
    border: none;
    border-radius: 10px;
    background: rgba(0, 200, 0, 0.7);
    color: white;
    cursor: pointer;
    transition: background 0.2s;
}
#play-btn:hover { background: rgba(0, 200, 0, 1); }

#unmute-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 10;
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: rgba(0, 200, 0, 0.5);
    color: white;
    cursor: pointer;
    transition: background 0.2s;
}
#unmute-btn:hover { background: rgba(0, 200, 0, 1); }

#fullscreen-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    z-index: 10;
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: rgba(0, 200, 0, 0.5);
    color: white;
    cursor: pointer;
    transition: background 0.2s;
}
#fullscreen-btn:hover { background: rgba(0, 200, 0, 1); }

/* Buffering Spinner */
#spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 15;
    border: 8px solid rgba(255,255,255,0.2);
    border-top: 8px solid white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    display: none;
}
@keyframes spin {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}
</style>
</head>
<body>

<div id="player-container">
    <video id="player-video" playsinline></video>
    <button id="play-btn">▶ Play</button>
    <button id="unmute-btn">🔊 Unmute</button>
    <button id="fullscreen-btn">⛶</button>
    <div id="spinner"></div>
</div>

<!-- Ad Fallback -->
<noscript>
<a href="https://al5sm.com/" target="_blank">
<img src="https://i.imgur.com/8T3YF0Z.jpeg" alt="Watch Ad" style="width:100%;border-radius:12px;">
</a>
</noscript>

<script>
// --- STREAM & DRM SETTINGS ---
const streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";
const clearKeyId = "549ab7cd35a64bb6bb479ecead04d69d";
const clearKeyValue = "829799ed534d11fcadeb4b192467e050";

// --- ELEMENTS ---
const video = document.getElementById("player-video");
const playBtn = document.getElementById("play-btn");
const unmuteBtn = document.getElementById("unmute-btn");
const fullscreenBtn = document.getElementById("fullscreen-btn");
const spinner = document.getElementById("spinner");

let player;
let monetagLoaded = false;

function showSpinner(show) {
    spinner.style.display = show ? "block" : "none";
}

// --- LOAD YOUR MONETAG ADS ---
function loadMonetagAds() {
    if (!monetagLoaded) {
        monetagLoaded = true;
        console.log("✅ Loading Monetag Ads...");
        // Ad script 1
        (function(s){ 
            s.dataset.zone='10131170'; 
            s.src='https://al5sm.com/tag.min.js'; 
            document.body.appendChild(s); 
        })(document.createElement('script'));
        // Ad script 2
        (function(s){ 
            s.dataset.zone='10131172'; 
            s.src='https://groleegni.net/vignette.min.js'; 
            document.body.appendChild(s); 
        })(document.createElement('script'));
    }
}

// --- INITIALIZE SHAKA PLAYER ---
async function initPlayer() {
    shaka.polyfill.installAll();
    player = new shaka.Player(video);

    // Clear Key DRM
    player.configure({
        drm: {
            clearKeys: {
                [clearKeyId]: clearKeyValue
            }
        }
    });

    // Load stream
    try {
        await player.load(streamUrl);
        console.log("✅ Stream loaded successfully");
        video.volume = 0; // start muted
        playBtn.style.display = "inline-block";
        unmuteBtn.style.display = "inline-block";
    } catch (error) {
        console.error("❌ Error loading stream:", error);
        setTimeout(initPlayer, 5000); // retry
    }

    // Buffering
    video.addEventListener("waiting", () => showSpinner(true));
    video.addEventListener("playing", () => showSpinner(false));

    // Auto-reload on error
    player.addEventListener("error", () => {
        console.warn("⚠️ Stream error, reloading...");
        player.destroy();
        setTimeout(initPlayer, 3000);
    });
}

// --- UI CONTROLS ---
playBtn.addEventListener("click", () => {
    video.play();
    playBtn.style.display = "none";
    loadMonetagAds(); // load ads on play
});

unmuteBtn.addEventListener("click", () => {
    video.volume = 1;
    unmuteBtn.style.display = "none";
    loadMonetagAds(); // load ads on unmute
});

fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        video.requestFullscreen().catch(err => console.warn("Fullscreen error:", err));
    } else {
        document.exitFullscreen();
    }
});

// Start
window.addEventListener("load", initPlayer);
console.log("✅ Shaka Player with ads ready");
</script>

</body>
</html>
