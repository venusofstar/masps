<script>
const streamUrl = "https://proxystrm.honortv-stream.workers.dev/?url=https://mainstreams.pro/hls/hbfkazbkaznc49.m3u8";

let hls;
let video = document.getElementById("player-bet");
let playBtn = document.getElementById("play-btn");
let unmuteBtn = document.getElementById("unmute-btn");
let fullscreenBtn = document.getElementById("fullscreen-btn");
let spinner = document.getElementById("spinner");

function showSpinner(show) {
    spinner.style.display = show ? "block" : "none";
}

function loadPlayer() {
    if (hls) { hls.destroy(); hls = null; }

    hls = new Hls({ enableWorker:true, lowLatencyMode:true, backBufferLength:90 });
    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    video.addEventListener("waiting", () => showSpinner(true));
    video.addEventListener("playing", () => showSpinner(false));

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.volume = 0;
        playBtn.style.display = "inline-block";
    });

    hls.on(Hls.Events.ERROR, (event, data) => {
        console.warn("HLS.js error:", data);
        if (data.fatal) setTimeout(loadPlayer, 2000);
    });

    video.addEventListener("ended", () => setTimeout(loadPlayer, 2000));
    video.addEventListener("stalled", () => setTimeout(loadPlayer, 2000));
    video.addEventListener("error", () => setTimeout(loadPlayer, 2000));
}

// Manual play
playBtn.addEventListener("click", () => { video.play(); playBtn.style.display="none"; loadMonetagAds(); });
unmuteBtn.addEventListener("click", () => { video.volume=1; unmuteBtn.style.display="none"; loadMonetagAds(); });
fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) { video.requestFullscreen().catch(err=>console.warn(err)); }
    else { document.exitFullscreen(); }
});

const controls = document.getElementById("controls");

let hideTimer;

function showControls() {
    controls.classList.remove("hide");
    controls.classList.add("show");

    clearTimeout(hideTimer);

    if (!video.paused) {
        hideTimer = setTimeout(() => {
            controls.classList.remove("show");
            controls.classList.add("hide");
        }, 3000);
    }
}

function hideControls() {
    if (!video.paused) {
        controls.classList.remove("show");
        controls.classList.add("hide");
    }
}

video.addEventListener("playing", () => {
    showSpinner(false);
    showControls();
});

video.addEventListener("pause", () => {
    controls.classList.remove("hide");
    controls.classList.add("show");
});

video.addEventListener("click", showControls);

document.getElementById("player-container")
.addEventListener("click", (e) => {
    if (
        e.target === video ||
        e.target.id === "player-container"
    ) {
        showControls();
    }
});

playBtn.addEventListener("click", () => {
    video.play();
    loadMonetagAds();
    showControls();
});

unmuteBtn.addEventListener("click", () => {
    video.volume = 1;
    unmuteBtn.style.display = "none";
    showControls();
    loadMonetagAds();
});

fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        video.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
    showControls();
});

loadPlayer();
window.addEventListener('load', ()=>{ console.log("✅ MASPORTS (Monetag Edition) loaded in", performance.now().toFixed(1), "ms"); });
