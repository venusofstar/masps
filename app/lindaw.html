<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<meta name="monetag" content="f6122dcf0ae0344432a93322d9615e30">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:black;
overflow:hidden;
}

#player-container{
width:100%;
height:100%;
position:relative;
}

video{
width:100%;
height:100%;
background:black;
object-fit:contain;
}

/* buttons */

button{
background:rgba(0,200,0,0.7);
color:white;
border:none;
border-radius:8px;
padding:12px 20px;
font-size:18px;
cursor:pointer;
}

#play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
font-size:24px;
}

#unmute-btn{
position:absolute;
top:15px;
left:15px;
z-index:10;
}

#fullscreen-btn{
position:absolute;
top:15px;
right:15px;
z-index:10;
}

/* spinner */

#spinner{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:7px solid rgba(255,255,255,0.2);
border-top:7px solid white;
border-radius:50%;
width:55px;
height:55px;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}
</style>

</head>

<body>

<div id="player-container">

<video id="video" playsinline preload="auto"></video>

<button id="play-btn">▶ Play</button> <button id="unmute-btn">🔊 Unmute</button> <button id="fullscreen-btn">⛶</button>

<div id="spinner"></div>

</div>

<script>

/* VIDEO SOURCE */
const videoSrc="https://ia800702.us.archive.org/25/items/lindawolker-tagalog/lindawolker-tagalog.mp4";

let video=document.getElementById("video");
let playBtn=document.getElementById("play-btn");
let unmuteBtn=document.getElementById("unmute-btn");
let fullscreenBtn=document.getElementById("fullscreen-btn");
let spinner=document.getElementById("spinner");

let hls;
let monetagLoaded=false;

/* MONETAG */

function loadMonetagAds(){

if(monetagLoaded) return;

monetagLoaded=true;

console.log("Loading Monetag ads");

(function(s){
s.dataset.zone='10131170';
s.src='https://al5sm.com/tag.min.js';
document.body.appendChild(s);
})(document.createElement('script'));

(function(s){
s.dataset.zone='10131172';
s.src='https://groleegni.net/vignette.min.js';
document.body.appendChild(s);
})(document.createElement('script'));

}

/* spinner */

function showSpinner(v){
spinner.style.display=v?"block":"none";
}

/* load player */

function loadPlayer(){

if(hls){
hls.destroy();
hls=null;
}

if(videoSrc.endsWith(".m3u8") && Hls.isSupported()){

hls=new Hls();

hls.loadSource(videoSrc);
hls.attachMedia(video);

}else{

video.src=videoSrc;

}

}

/* buffering */

video.addEventListener("waiting",()=>showSpinner(true));
video.addEventListener("playing",()=>showSpinner(false));

/* buttons */

playBtn.onclick=()=>{

video.play();

playBtn.style.display="none";

loadMonetagAds();

};

unmuteBtn.onclick=()=>{

video.volume=1;

unmuteBtn.style.display="none";

loadMonetagAds();

};

fullscreenBtn.onclick=()=>{

if(!document.fullscreenElement){

video.requestFullscreen().catch(()=>{});

}else{

document.exitFullscreen();

}

loadMonetagAds();

};

/* start */

loadPlayer();

</script>

</body>
</html>
